name: GitHub-Profile-3D-Contrib

on:
  schedule: # Runs daily at 18:00 UTC
    - cron: "0 18 * * *"
  workflow_dispatch: # Allows manual runs from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-3d-contrib
    steps:
      - uses: actions/checkout@v4

      # ---- Current year (2026) ----
      - name: Generate 2026
        uses: yoshi389111/github-profile-3d-contrib@0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Save 2026
        run: cp profile-3d-contrib/profile-night-rainbow.svg profile-3d-contrib/profile-2026.svg

      # ---- 2025 ----
      - name: Generate 2025
        uses: yoshi389111/github-profile-3d-contrib@0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          YEAR: "2025"
      - name: Save 2025
        run: cp profile-3d-contrib/profile-night-rainbow.svg profile-3d-contrib/profile-2025.svg

      # ---- 2024 ----
      - name: Generate 2024
        uses: yoshi389111/github-profile-3d-contrib@0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          YEAR: "2024"
      - name: Save 2024
        run: cp profile-3d-contrib/profile-night-rainbow.svg profile-3d-contrib/profile-2024.svg

      # ---- 2023 ----
      - name: Generate 2023
        uses: yoshi389111/github-profile-3d-contrib@0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          YEAR: "2023"
      - name: Save 2023
        run: cp profile-3d-contrib/profile-night-rainbow.svg profile-3d-contrib/profile-2023.svg

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib
          git commit -m "chore: update 3d contrib (year-wise)" || echo "No changes"
          git push
